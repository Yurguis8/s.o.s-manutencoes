services:
  - type: web
    name: sos-manutencoes-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --prefix .. && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: BACKEND_URL
        sync: false
